# Professional Downstream Regression Configuration
# =================================================
# Configuration for fine-tuning pretrained foundation models on regression tasks
# (velocity/position prediction from neural data)

# Dataset configuration
dataset:
  dataset_id: 'te14116'                    # Single dataset ID for downstream task
  data_root: "/data/Fang-analysis/causal-nfm/Data/Monkey_data_meta"
  split_ratios: [0.2, 0.3, 0.5]          # (train, val, test) ratios
  target_neurons: 50                       # Target number of neurons (N dimension)
  width: 0.02                             # Time bin width (20ms)
  sequence_length: 50                      # Expected sequence length (T dimension)
  neuron_selection_strategy: 'first_n'    # 'first_n', 'random_n', or 'all'
  selected_neurons: 50                     # Number of neurons to select
  random_seed: 3407                         # Random seed for reproducible sampling

# Model configuration
model:
  dropout: 0.1                            # Dropout rate for downstream heads
  prediction_layers: 2                    # Number of layers in regression head (progressive reduction)
  temporal_pooling: 'none'                # Not used for regression (timestep-wise prediction)

# Training/Fine-tuning configuration
training:
  # Task-specific settings
  task_type: 'regression'                 # Task type identifier
  target_type: 'velocity'                # 'velocity' or 'position' prediction
  output_dim: 2                           # Output dimensions (x, y)
  training_mode: 'finetune_encoder'         # 'frozen_encoder', 'finetune_encoder', or 'random'
  
  # Optimization settings
  learning_rate: 0.0001                    # Learning rate (higher for frozen encoder)
  weight_decay: 0.01                      # AdamW weight decay
  batch_size: 32                          # Batch size
  num_epochs: 200                         # Number of training epochs
  
  # Learning rate scheduling
  decay_epochs: 50                        # LR decay every N epochs
  decay_rate: 0.9                         # LR decay factor
  
  # Regularization
  max_grad_norm: 1.0                      # Gradient clipping norm
  use_l1_regularization: false            # Enable L1 regularization
  l1_weight: 0.01                         # L1 regularization weight
  
  # Early stopping
  early_stopping_patience: 100             # Stop if no improvement for N epochs
  
  # Checkpointing
  save_freq: 200                           # Save checkpoint every N epochs
  
  # Reproducibility
  random_seed: 3407

# Paths configuration (auto-managed by enhanced logger)
paths:
  base_dir: "./logs_neuropixel_downstream"                      # Base directory for all outputs
  experiment_name: null                   # Auto-generated based on config
  
  # Pretrained model path
  pretrained_path: './logs_neuropixel/full_small_model/checkpoints/best.pth'
  
  # Output paths (auto-generated by enhanced logger)
  # ./logs_neuralpixel_downstream/experiment_name/
  # ├── training_logs/    (training.log, statistics.json)
  # ├── runs/            (TensorBoard logs)
  # ├── checkpoints/     (best.pth, latest.pth)
  # ├── config/          (saved configuration files)
  # └── model_summary/   (model architecture, parameter counts)

# Hardware configuration
hardware:
  device: 'auto'                          # 'auto', 'cuda', or 'cpu'
  num_workers: 4                          # DataLoader workers
  pin_memory: true                        # Pin memory for faster GPU transfer

# Experiment metadata
experiment:
  description: "Downstream regression task with configurable training modes"
  tags: ["downstream", "regression", "velocity_prediction", "training_modes"]
  notes: "Fine-tuning for velocity prediction with frozen/finetuned/random encoder modes for ablation studies"
  
  # Dataset and model info
  dataset_info:
    source: "Neural foundation model downstream evaluation"
    task: "Velocity prediction from single-site neural activity"
    input_format: "[B, 1, T, N] + site coordinates"
    output_format: "[B, T, 2] velocity vectors"
  
  # Expected performance (for comparison)
  baseline_metrics:
    target_r2: 0.7                        # Target R² score
    target_mae: 0.1                       # Target MAE
    convergence_epochs: 100               # Expected convergence time

# Advanced options
advanced:
  # Model analysis
  save_predictions: true                  # Save predictions for analysis
  compute_attention_maps: false           # Extract attention patterns (expensive)
  
  # Debugging
  debug_mode: false                       # Enable debug logging
  profile_training: false                 # Profile training loop
  
  # Visualization
  plot_training_curves: true              # Plot training curves
  save_sample_predictions: true           # Save sample predictions for visualization 