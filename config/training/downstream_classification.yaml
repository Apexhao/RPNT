# Professional Downstream Classification Configuration
# ===================================================
# Configuration for fine-tuning pretrained foundation models on classification tasks
# (direction/action classification from neural data)

# Dataset configuration
dataset:
  dataset_id: 'te14116'                    # Single dataset ID for downstream task
  data_root: "/data/Fang-analysis/causal-nfm/Data/Monkey_data_meta"
  split_ratios: [0.8, 0.1, 0.1]          # [train, val, test] ratios
  target_neurons: 50                       # Target number of neurons (N dimension)
  width: 0.02                             # Time bin width (20ms)
  sequence_length: 50                      # Expected sequence length (T dimension)
  neuron_selection_strategy: 'first_n'    # 'first_n', 'random_n', or 'all'
  selected_neurons: 50                     # Number of neurons to select
  random_seed: 42                         # Random seed for reproducible sampling

# Model configuration
model:
  dropout: 0.1                            # Dropout rate for downstream heads
  temporal_pooling: 'mean'                # 'mean', 'last', or 'attention' for sequence-to-label

# Training/Fine-tuning configuration
training:
  # Task-specific settings
  task_type: 'classification'             # Task type identifier
  num_classes: 8                          # Number of classes (directions)
  training_mode: 'frozen_encoder'         # 'frozen_encoder' or 'finetune_encoder'
  
  # Optimization settings
  learning_rate: 0.001                    # Learning rate (higher for frozen encoder)
  weight_decay: 0.01                      # AdamW weight decay
  batch_size: 32                          # Batch size
  num_epochs: 200                         # Number of training epochs
  
  # Learning rate scheduling
  decay_epochs: 50                        # LR decay every N epochs
  decay_rate: 0.9                         # LR decay factor
  
  # Regularization
  max_grad_norm: 1.0                      # Gradient clipping norm
  label_smoothing: 0.0                    # Label smoothing factor (0.0 = no smoothing)
  
  # Early stopping
  early_stopping_patience: 50             # Stop if no improvement for N epochs
  
  # Checkpointing
  save_freq: 50                           # Save checkpoint every N epochs
  
  # Reproducibility
  random_seed: 42

# Paths configuration (auto-managed by enhanced logger)
paths:
  base_dir: "./logs"                      # Base directory for all outputs
  experiment_name: null                   # Auto-generated based on config
  
  # Pretrained model path
  pretrained_path: './logs/full_small_model/checkpoints/best.pth'
  
  # Output paths (auto-generated by enhanced logger)
  # ./logs/experiment_name/
  # ├── training_logs/    (training.log, statistics.json)
  # ├── runs/            (TensorBoard logs)
  # ├── checkpoints/     (best.pth, latest.pth)
  # ├── config/          (saved configuration files)
  # └── model_summary/   (model architecture, parameter counts)

# Hardware configuration
hardware:
  device: 'auto'                          # 'auto', 'cuda', or 'cpu'
  num_workers: 4                          # DataLoader workers
  pin_memory: true                        # Pin memory for faster GPU transfer

# Experiment metadata
experiment:
  description: "Downstream classification task using frozen pretrained temporal encoder"
  tags: ["downstream", "classification", "direction_prediction", "frozen_encoder"]
  notes: "Fine-tuning for direction classification with frozen foundation model encoder"
  
  # Dataset and model info
  dataset_info:
    source: "Neural foundation model downstream evaluation"
    task: "Direction classification from single-site neural activity"
    input_format: "[B, 1, T, N] + site coordinates"
    output_format: "[B] class labels (8 directions)"
  
  # Expected performance (for comparison)
  baseline_metrics:
    target_accuracy: 0.85                 # Target accuracy
    target_f1: 0.83                       # Target F1-score (macro)
    convergence_epochs: 100               # Expected convergence time

# Advanced options
advanced:
  # Model analysis
  save_predictions: true                  # Save predictions for analysis
  compute_confusion_matrix: true          # Compute and save confusion matrix
  compute_attention_maps: false           # Extract attention patterns (expensive)
  
  # Debugging
  debug_mode: false                       # Enable debug logging
  profile_training: false                 # Profile training loop
  
  # Visualization
  plot_training_curves: true              # Plot training curves
  save_sample_predictions: true           # Save sample predictions for visualization
  plot_confusion_matrix: true             # Plot confusion matrix

# Class-specific configuration (optional)
classes:
  # Direction labels (assuming 8-direction task)
  labels: ["N", "NE", "E", "SE", "S", "SW", "W", "NW"]
  
  # Class weights (for imbalanced datasets)
  use_class_weights: false                # Enable class weighting
  class_weights: null                     # Auto-computed if null and use_class_weights=true
  
  # Per-class evaluation
  compute_per_class_metrics: true         # Compute per-class precision/recall/F1 